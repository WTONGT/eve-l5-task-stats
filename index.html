<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五级任务报酬统计</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f6f2;--card:#fff;--border:#e8e5e0;--text:#1e1e1e;--text2:#6f6b65;--text3:#a8a39b;
  --blue:#5b5ea6;--blue-10:#f4f3fa;--green:#d4913e;--red:#d4645c;
  --radius:14px;--radius-sm:9px;--shadow-sm:0 1px 2px rgba(0,0,0,.03);
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.04);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
}
body{background:var(--bg);min-height:100vh;font:14px/1.65 var(--font);color:var(--text);-webkit-font-smoothing:antialiased}
.container{max-width:640px;margin:0 auto;padding:32px 20px 60px}
header{text-align:center;margin-bottom:28px;position:relative}
header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.gear{position:absolute;top:0;right:0;color:var(--text3);text-decoration:none;font-size:18px;padding:4px 6px;border-radius:6px;transition:all .15s;line-height:1}
.gear:hover{color:var(--text);background:#e8e5e1}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:18px}
.price-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;padding:12px}
.price-tag{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:background .15s,color .15s}
.price-tag:hover{background:var(--blue-10);color:var(--blue)}
.price-tag:hover span{color:var(--blue)}
.price-tag .price-num{font-weight:700;color:var(--green)}
.price-tag.free{color:var(--red)}
.price-tag.free .price-num{color:var(--red)}
textarea{display:block;width:100%;min-height:130px;padding:14px 18px;border:1px solid var(--border);border-radius:var(--radius);font:13px/1.7 var(--font);color:var(--text);resize:vertical;outline:none;background:var(--card);box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s;margin-bottom:18px}
textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(91,94,166,.1)}
textarea::placeholder{color:var(--text3)}
.btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 22px;border-radius:var(--radius-sm);font:14px/1 var(--font);font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#4e5192;transform:translateY(-1px);box-shadow:0 2px 8px rgba(91,94,166,.25)}
.btn-gray{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-gray:hover{background:#eeebe8;color:var(--text)}
.result-heading{font-size:16px;font-weight:700;text-align:center;margin-bottom:16px}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s;cursor:pointer;user-select:none}
.player-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.player-card:active{transform:translateY(0)}
.player-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.player-info{display:flex;align-items:center}
.player-name{font-size:16px;font-weight:700;color:var(--text)}
.task-items{border-top:1px solid var(--border)}
.task-item{display:flex;align-items:center;font-size:13px;padding:8px 0;border-bottom:1px solid var(--bg)}
.task-item:last-child{border-bottom:none}
.task-name{flex:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;color:var(--text);margin-right:8px}
.task-detail{flex:4;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px}
.task-price{flex:0 0 56px;text-align:right;font-weight:600;color:var(--green)}
.task-item.zero .task-name,.task-item.zero .task-price{color:var(--red)}
.player-total{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-weight:600;color:var(--green);text-align:right;font-size:15px}
.grand-total{margin-top:16px;padding:16px;background:var(--green);color:#fff;text-align:center;border-radius:var(--radius);font-size:17px;font-weight:700;box-shadow:0 2px 12px rgba(212,145,62,.25);cursor:pointer;user-select:none;transition:filter .15s,transform .15s}
.grand-total:hover{filter:brightness(1.05)}
.grand-total:active{transform:translateY(1px)}
.footer-nav{display:flex;justify-content:center;gap:10px;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.footer-nav a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;padding:7px 16px;border-radius:20px;border:1px solid var(--border);transition:all .15s}
.footer-nav a:hover{color:var(--blue);border-color:var(--blue);background:var(--blue-10)}

/* ---- 未识别行提醒 ---- */
.unrec-card{background:#fdeceb;border:1px solid var(--red);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;font-size:13px}
.unrec-title{color:var(--red);font-weight:600;margin-bottom:8px}
.unrec-list{color:var(--text2);word-break:break-all;line-height:1.9}
.unrec-tip{margin-top:8px;color:var(--text3);font-size:12px}
</style>
</head>
<body>
<div class="container">
<header><h1>五级任务报酬统计</h1><a href="price-config.html" class="gear" title="价目与识别词">⚙</a></header>

<div class="price-card">
  <div class="price-grid" id="priceGrid"></div>
</div>

<textarea id="input" placeholder="在游戏地点窗口中，选中所有完成任务的地点&#10;Ctrl+C 复制 &#8594; 在这里 Ctrl+V 粘贴即可"></textarea>
<div class="btn-row">
  <button class="btn btn-blue" onclick="calc()">开始统计</button>
  <button class="btn btn-gray" onclick="clearAll()">清空</button>
</div>

<div id="result"></div>

<div class="footer-nav">
  <a href="boss-config.html">老板登记</a>
</div>
</div>

<script src="html2canvas.min.js"></script>
<script>
// EVE 五级任务报酬统计：粘贴游戏地点窗口数据 → 解析任务 → 按老板分组统计报酬

// API 地址：Netlify 环境走相对路径，自定义域名从 localStorage 读取
var API = (function(){
  var host = location.host;
  if (host.indexOf("netlify.app") !== -1 || host.indexOf("localhost") !== -1) return "/.netlify/functions/config";
  return localStorage.getItem("eve_api_url") || "";
})();

// 默认配置（首次加载 / 离线降级时使用）
var DEFAULT_CONFIG = { taskPrices: {}, keyMap: {}, keyMapOrder: [], taskPriceOrder: [], bosses: {} };

var CONFIG = null;                   // 配置对象
var _sortedKeysCache = null;         // keyMap 排序缓存

// 正则预编译（性能优化）
var TIME_REGEX = /\d{4}[\.\-\/]\d{2}[\.\-\/]\d{2}\s+\d{1,2}:\d{2}(:\d{2})?/;  // 日期时间
var PURE_NUM_REGEX = /^-?\d+(\.\d+)?$/;     // 纯数字（坐标/数量/安全等级）
var AU_REGEX = /^\d+(\.\d+)?\s*AU$/i;         // 距离单位 AU
var LABEL_REGEX = /^(坐标|任务|地点|星域|星系|星座|安全|距离|分类|标签|类型)$/;  // 列标签词
var SAFE_ID_REGEX = /[^a-zA-Z0-9\u4e00-\u9fff]/g;  // 安全 ID 清洗

// HTML 转义，防 XSS
function htmlEscape(s) { return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// 页面入口：加载配置 → 渲染价目表
function loadConfig() { fetchConfig().then(renderPriceGrid); }

// 从服务端拉取配置，版本号未变则复用本地缓存（增量同步），失败降级 localStorage
function fetchConfig() {
  if (!API) { useLocalCache(); return Promise.resolve(); }
  var ver = parseInt(localStorage.getItem("eve_config_version"), 10) || 0;
  return fetch(API + "?v=" + ver)
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
      if (data.unchanged) {
        var cached = localStorage.getItem("eve_config");
        CONFIG = cached ? JSON.parse(cached) : { bosses:{}, taskPrices:{}, keyMap:{}, keyMapOrder:[], taskPriceOrder:[] };
      } else {
        CONFIG = data;
        localStorage.setItem("eve_config", JSON.stringify(data));
        if (data.v) localStorage.setItem("eve_config_version", data.v);
      }
      _sortedKeysCache = null;
    })
    .catch(function() { useLocalCache(); });
}

// 离线降级：从 localStorage 读取缓存，无缓存则使用默认配置
function useLocalCache() {
  var raw = localStorage.getItem("eve_config");
  if (raw) { try { CONFIG = JSON.parse(raw); _sortedKeysCache = null; return; } catch(e) {} }
  CONFIG = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  _sortedKeysCache = null;
}

function renderPriceGrid() {
  var grid = document.getElementById("priceGrid");
  if (!CONFIG || !CONFIG.taskPrices) { grid.innerHTML = ""; return; }
  var order = CONFIG.taskPriceOrder;
  var names = order && order.length
    ? order.filter(function(k){ return CONFIG.taskPrices.hasOwnProperty(k); })
    : Object.keys(CONFIG.taskPrices).sort();
  grid.innerHTML = names.map(function(name) {
    var price = CONFIG.taskPrices[name];
    return '<div class="price-tag' + (price === 0 ? ' free' : '') + '" data-task="' + htmlEscape(name) + '">' + htmlEscape(name) + '<span class="price-num">' + htmlEscape(price) + 'M</span></div>';
  }).join("");
  grid.querySelectorAll(".price-tag[data-task]").forEach(function(el) {
    el.addEventListener("click", function() { copyTaskName(this.getAttribute("data-task")); });
  });
}

// 文本复制：优先 Clipboard API，失败回退 execCommand
function copyText(text, successMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showToast(successMsg); }).catch(function() { fallbackCopyText(text, successMsg); });
  } else {
    fallbackCopyText(text, successMsg);
  }
}

// 价目表点击复制任务名
function copyTaskName(name) {
  copyText(name, "已复制「" + name + "」");
}

function fallbackCopyText(text, successMsg) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand("copy");
    showToast(successMsg);
  } catch (e) {
    showToast("复制失败，请手动复制");
  }
  document.body.removeChild(ta);
}

// 清空输入和结果
function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("result").innerHTML = "";
}

// 数据解析：不依赖固定列索引，通过内容特征识别各字段
function parseLine(line) {
  var raw = line.trim();
  if (!raw) return { task:"未识别", location:"未知", time:"", publisher:"未识别" };

  var fields = raw.split(/\s{2,}|\t+/).filter(function(f) { return f.trim().length > 0; });
  if (fields.length === 0) return { task:"未识别", location:"未知", time:"", publisher:"未识别" };

  var taskName = fields[0].replace(/^\d+\s*/, "");

  var timeIdx = -1, timeStr = "";
  for (var i = 0; i < fields.length; i++) {
    var m = fields[i].match(TIME_REGEX);
    if (m) { timeIdx = i; timeStr = m[0]; break; }
  }

  var publisher = "";
  if (timeIdx >= 0 && timeIdx + 1 < fields.length) {
    publisher = fields[fields.length - 1].trim();
  }
  if (!publisher) {
    var dashIdx = raw.lastIndexOf(" - ");
    if (dashIdx !== -1) publisher = raw.substring(dashIdx + 3).trim();
  }
  if (!publisher) publisher = "未识别";

  var location = "未知";
  var candidates = [];
  var endIdx = timeIdx >= 0 ? timeIdx : fields.length;

  for (var j = 1; j < endIdx; j++) {
    var f = fields[j].trim();
    if (!f) continue;
    if (PURE_NUM_REGEX.test(f)) continue;
    if (AU_REGEX.test(f)) continue;
    if (LABEL_REGEX.test(f)) continue;
    if (f === "-") continue;
    candidates.push(f);
  }

  if (candidates.length > 0) {
    location = candidates[0].replace(/\*$/, "").trim();
  } else if (fields.length >= 2 && (fields.length >= 3 || timeIdx < 0)) {
    location = fields[1].replace(/\*$/, "").trim();
  }
  if (!location) location = "未知";

  return { task: recognizeTask(taskName), location: location, time: timeStr, publisher: publisher };
}

// 任务名模糊匹配：按 keyMapOrder 顺序匹配，长关键词优先
function recognizeTask(rawName) {
  if (!_sortedKeysCache) {
    var order = CONFIG.keyMapOrder;
    _sortedKeysCache = (order && order.length)
      ? order.filter(function(k){ return CONFIG.keyMap.hasOwnProperty(k); })
      : Object.keys(CONFIG.keyMap).sort(function(a,b){ return b.length - a.length; });
  }
  for (var i = 0; i < _sortedKeysCache.length; i++) {
    if (rawName.indexOf(_sortedKeysCache[i]) !== -1) return CONFIG.keyMap[_sortedKeysCache[i]];
  }
  return rawName || "未识别";
}

// 声望号 → 老板名映射查找
function findBoss(publisherId) {
  var bosses = Object.keys(CONFIG.bosses);
  for (var i = 0; i < bosses.length; i++) {
    if (CONFIG.bosses[bosses[i]].indexOf(publisherId) !== -1) return bosses[i];
  }
  return null;
}

// 统计计算：逐行解析 → 识别任务名 → 查价目 → 匹配老板 → 分组累加
function calc() {
  var text = document.getElementById("input").value.trim();
  if (!text) { alert("请粘贴任务地点数据"); return; }
  if (!CONFIG) { alert("配置加载中，请稍候"); return; }

  var bossGroups = {}, grandTotal = 0;
  var unrecognized = [];
  text.split("\n").forEach(function(l) {
    l = l.trim(); if (!l) return;
    var p = parseLine(l), boss = findBoss(p.publisher);

    if (p.task === "未识别" || !boss || !CONFIG.taskPrices.hasOwnProperty(p.task)) {
      unrecognized.push(l);
      return;
    }

    var price = CONFIG.taskPrices[p.task];
    var item = { task:p.task, location:p.location, publisher:p.publisher, time:p.time, price:price };
    if (!bossGroups[boss]) bossGroups[boss] = { total:0, items:[] };
    bossGroups[boss].items.push(item); bossGroups[boss].total += price;
    grandTotal += price;
  });
  render(bossGroups, grandTotal, unrecognized);
}

// 结果渲染：未识别提醒 + 老板卡片 + 总计栏
var _cardIdCounter = 0;

function render(bossGroups, grandTotal, unrecognized) {
  _cardIdCounter = 0;
  var html = '<div class="result-heading">统计结果</div>';

  if (unrecognized && unrecognized.length) {
    html += '<div class="unrec-card">';
    html += '<div class="unrec-title">注意：有 ' + unrecognized.length + ' 行未识别（未识别老板、任务或任务不在价目表中），已自动排除、不计入统计</div>';
    html += '<div class="unrec-list">' + unrecognized.map(function(line) { return htmlEscape(line); }).join('<br>') + '</div>';
    html += '<div class="unrec-tip">可自行补充老板ID或规范任务名称写法</div>';
    html += '</div>';
  }

  Object.keys(bossGroups).sort().forEach(function(name) {
    html += renderPlayerCard(name, bossGroups[name]);
  });
  html += '<div class="grand-total" onclick="shareAll()">总收入：' + grandTotal + ' M</div>';
  document.getElementById("result").innerHTML = html;
}

// 渲染单个老板卡片
function renderPlayerCard(name, group) {
  var safeId = name.replace(SAFE_ID_REGEX, "") + "-" + _cardIdCounter++;
  var h = '<div class="player-card" id="box-' + safeId + '" onclick="shareCard(\'' + safeId + '\')">';
  h += '<div class="player-header"><div class="player-info">';
  h += '<span class="player-name">' + htmlEscape(name) + '</span>';
  h += '</div></div>';
  h += '<div class="task-items" id="list-' + safeId + '">';
  group.items.forEach(function(it) {
    h += '<div class="task-item' + (it.price === 0 ? ' zero' : '') + '">';
    h += '<span class="task-name">' + htmlEscape(it.task) + '</span>';
    h += '<span class="task-detail">' + htmlEscape(it.location) + ' &middot; ' + htmlEscape(it.time) + ' &middot; ' + htmlEscape(it.publisher) + '</span>';
    h += '<span class="task-price">' + it.price + ' M</span>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div class="player-total">报酬：' + group.total + ' M</div>';
  return h + '</div>';
}

// 截图分享：降级链（剪贴板 → Web Share → 下载）
var _sharingCardId = null;
var _sharingAll = false;

// 截图辅助：截图前临时清除 transform/box-shadow/filter，避免 hover/active 态被固化进图片
function capture(el) {
  var targets = (el.classList.contains("player-card") || el.classList.contains("grand-total"))
    ? [el]
    : el.querySelectorAll(".player-card, .grand-total");
  var saved = Array.prototype.slice.call(targets).map(function(t) {
    return [t, t.style.transform, t.style.boxShadow, t.style.filter];
  });
  saved.forEach(function(item) {
    item[0].style.transform = "none";
    item[0].style.boxShadow = "none";
    item[0].style.filter = "none";
  });
  function restore() {
    saved.forEach(function(item) {
      item[0].style.transform = item[1];
      item[0].style.boxShadow = item[2];
      item[0].style.filter = item[3];
    });
  }
  return html2canvas(el, { backgroundColor:"#f8f6f2", scale:2 }).then(
    function(canvas) { restore(); return canvas; },
    function(err) { restore(); throw err; }
  );
}

// 通用截图分享：截图 el → 剪贴板 → Web Share → 下载（三级降级）
function shareCapture(el, successMsg, done) {
  capture(el).then(function(canvas) {
    canvas.toBlob(function(blob) {
      if (!blob) { showToast("生成图片失败"); done(); return; }
      if (navigator.clipboard && navigator.clipboard.write && window.ClipboardItem) {
        navigator.clipboard.write([new ClipboardItem({ "image/png": blob })])
          .then(function() { showToast(successMsg); done(); })
          .catch(function() { tryFallbackShare(blob, done); });
        return;
      }
      tryFallbackShare(blob, done);
    }, "image/png");
  }).catch(function() { showToast("截图生成失败，请重试"); done(); });
}

// 总体分享：截取整个结算结果区
function shareAll() {
  if (_sharingAll) return;
  var result = document.getElementById("result");
  if (!result.innerHTML.trim()) { showToast("请先点「开始统计」生成数据"); return; }
  if (typeof html2canvas !== "function") { showToast("截图组件未加载，请刷新页面重试"); return; }

  _sharingAll = true;
  showToast("生成中...");
  shareCapture(result, "已复制全部结算单，Ctrl+V 粘贴到QQ即可", function(){ _sharingAll = false; });
}

// 卡片分享：点击整卡片触发截图分享
function shareCard(id) {
  if (_sharingCardId) return;
  var card = document.getElementById("box-" + id);
  if (!card) return;
  if (typeof html2canvas !== "function") { showToast("截图组件未加载，请刷新页面重试"); return; }

  _sharingCardId = id;
  showToast("生成中...");
  shareCapture(card, "已复制到剪贴板，Ctrl+V 粘贴到QQ即可", function(){ _sharingCardId = null; });
}

// 分享降级：Web Share API（移动端系统分享）
function tryFallbackShare(blob, done) {
  if (navigator.share && navigator.canShare) {
    try {
      var file = new File([blob], "统计.png", { type: "image/png" });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] })
          .then(function() { done(); })
          .catch(function() { tryDownloadImage(blob, done); });
        return;
      }
    } catch (e) { }
  }
  tryDownloadImage(blob, done);
}

// 分享兜底：触发浏览器下载图片
function tryDownloadImage(blob, done) {
  try {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "任务统计.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    showToast("图片已开始下载");
  } catch (e) {
    showToast("分享失败，请截图保存");
  }
  done();
}

// Toast 提示
var toastTimer;
function showToast(msg) {
  var el = document.getElementById("toast");
  if (!el) {
    el = document.createElement("div"); el.id = "toast";
    el.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e1e1e;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:999;transition:opacity .3s;pointer-events:none";
    document.body.appendChild(el);
  }
  clearTimeout(toastTimer);
  el.textContent = msg; el.style.opacity = "1";
  toastTimer = setTimeout(function(){ el.style.opacity = "0"; }, 2000);
}

window.onload = loadConfig;
// 从 bfcache 恢复时（浏览器后退按钮）重新加载配置，避免显示旧数据
