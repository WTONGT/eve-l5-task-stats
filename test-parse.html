<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解析测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f6f2;font:14px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;color:#1e1e1e;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:20px;margin-bottom:16px;text-align:center}
.card{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.card h2{font-size:15px;margin-bottom:10px}
textarea{display:block;width:100%;min-height:120px;padding:12px;border:1px solid #e8e5e0;border-radius:9px;font:13px/1.7 "Consolas","Monaco",monospace;resize:vertical;outline:none;background:#fff}
.btn-row{display:flex;gap:10px;margin-top:10px}
button{padding:8px 20px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #e8e5e0;background:#fff;color:#5b5ea6;transition:all .15s}
button:hover{background:#5b5ea6;color:#fff;border-color:#5b5ea6}
button.primary{background:#5b5ea6;color:#fff;border-color:#5b5ea6}
button.primary:hover{background:#4e5192}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #f2f0ed}
th{font-size:12px;color:#6f6b65;font-weight:700;background:#fafaf9}
tr.ok{background:#f6faf4}
tr.fail{background:#fef6f5}
.pass{color:#d4913e;font-weight:600}
.fail{color:#d4645c;font-weight:600}
.result-summary{font-size:14px;font-weight:600;margin-bottom:10px}
.test-cases{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.test-case-btn{font-size:12px;padding:5px 12px;border-radius:16px;background:#f3f2ef;border:none;cursor:pointer;color:#6f6b65}
.test-case-btn:hover{background:#e8e5e0;color:#1e1e1e}
.back{display:inline-block;margin-bottom:12px;color:#6f6b65;text-decoration:none;font-size:13px}
.back:hover{color:#5b5ea6}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← 返回</a>
<h1>🔍 数据解析测试</h1>

<div class="card">
  <h2>粘贴测试数据</h2>
  <textarea id="input" placeholder="在这里粘贴 EVE 地点窗口复制的数据，每行一条任务"></textarea>
  <div class="btn-row">
    <button class="primary" onclick="testAll()">解析测试</button>
    <button onclick="clearAll()">清空</button>
  </div>
  <div class="test-cases">
    <span style="font-size:12px;color:#a8a39b;align-self:center">快速加载测试用例：</span>
    <button class="test-case-btn" onclick="loadCase('standard')">标准9列</button>
    <button class="test-case-btn" onclick="loadCase('fewCols')">少列5列</button>
    <button class="test-case-btn" onclick="loadCase('tab')">Tab分隔</button>
    <button class="test-case-btn" onclick="loadCase('simple')">最简格式</button>
    <button class="test-case-btn" onclick="loadCase('mixed')">混合格式</button>
  </div>
</div>

<div class="card" id="resultCard" style="display:none">
  <h2>解析结果</h2>
  <div class="result-summary" id="summary"></div>
  <table>
    <thead>
      <tr>
        <th style="width:40px">#</th>
        <th>任务名</th>
        <th>地点</th>
        <th>时间</th>
        <th>发布者</th>
        <th style="width:60px">状态</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>
</div>
</div>

<script>
// ---------- 解析逻辑（与主页面一致） ----------
var _sortedKeysCache = null;
var TEST_CONFIG = {
  keyMap: {
    "繁殖": "繁殖设施", "设施": "繁殖设施",
    "天使": "天使的愤怒", "愤怒": "天使的愤怒",
    "解放": "解放矿工A", "解放矿工": "解放矿工A", "解放A": "解放矿工A",
    "袭击护航": "袭击护航队A", "护航": "袭击护航队A", "袭击": "袭击护航队A",
    "地点": "地点地点", "斩龙": "斩龙行动",
    "自由": "自由间谍", "间谍": "自由间谍",
    "萨沙": "萨沙取物", "取物": "萨沙取物"
  },
  keyMapOrder: ["袭击护航队目标C","解放矿工目标C","繁殖","设施","天使","愤怒","解放矿工a","解放矿工A","解放矿工c","解放矿工C","解放矿工","解放A","解放a","矿工A","矿工a","解放C","解放c","矿工C","矿工c","解放","矿工","袭击护航队a","袭击护航队A","袭击护航A","袭击护航队c","袭击护航队C","袭击护航C","袭击护航队","袭击护航","护航队A","护航队a","袭击A","袭击a","护航队C","护航队c","袭击C","袭击c","护航队","袭击","护航","地点","斩龙","荣誉目标"]
};

function recognizeTask(rawName) {
  if (!_sortedKeysCache) {
    var order = TEST_CONFIG.keyMapOrder;
    _sortedKeysCache = (order && order.length)
      ? order.filter(function(k){ return TEST_CONFIG.keyMap.hasOwnProperty(k); })
      : Object.keys(TEST_CONFIG.keyMap).sort(function(a,b){ return b.length - a.length; });
  }
  for (var i = 0; i < _sortedKeysCache.length; i++) {
    if (rawName.indexOf(_sortedKeysCache[i]) !== -1) return TEST_CONFIG.keyMap[_sortedKeysCache[i]];
  }
  return rawName || "未识别";
}

function parseLine(line) {
  var raw = line.trim();
  if (!raw) return { task:"未识别", location:"未知", time:"", publisher:"未识别", raw: "" };

  var fields = raw.split(/\s{2,}|\t+/).filter(function(f) { return f.trim().length > 0; });
  if (fields.length === 0) return { task:"未识别", location:"未知", time:"", publisher:"未识别", raw: raw };

  var rawTask = fields[0];
  var taskName = rawTask.replace(/^\d+\s*/, "");

  var timeRegex = /\d{4}[\.\-\/]\d{2}[\.\-\/]\d{2}\s+\d{1,2}:\d{2}(:\d{2})?/;
  var timeIdx = -1;
  var timeStr = "";
  for (var i = 0; i < fields.length; i++) {
    var m = fields[i].match(timeRegex);
    if (m) { timeIdx = i; timeStr = m[0]; break; }
  }

  var publisher = "";
  if (timeIdx >= 0 && timeIdx + 1 < fields.length) {
    publisher = fields[fields.length - 1].trim();
  }
  if (!publisher) {
    var dashIdx = raw.lastIndexOf(" - ");
    if (dashIdx !== -1) publisher = raw.substring(dashIdx + 3).trim();
  }
  if (!publisher) publisher = "未识别";

  var location = "未知";
  var candidates = [];
  var endIdx = timeIdx >= 0 ? timeIdx : fields.length;

  for (var j = 1; j < endIdx; j++) {
    var f = fields[j].trim();
    if (!f) continue;
    if (/^-?\d+(\.\d+)?$/.test(f)) continue;
    if (/^\d+(\.\d+)?\s*AU$/i.test(f)) continue;
    if (/^(坐标|任务|地点|星域|星系|星座|安全|距离|分类|标签|类型)$/.test(f)) continue;
    if (f === "-") continue;
    candidates.push(f);
  }

  if (candidates.length > 0) {
    location = candidates[0].replace(/\*$/, "").trim();
  } else if (fields.length >= 3) {
    location = fields[1].replace(/\*$/, "").trim();
  } else if (fields.length === 2 && timeIdx < 0) {
    location = fields[1].replace(/\*$/, "").trim();
  }
  if (!location) location = "未知";

  return {
    task: recognizeTask(taskName),
    location: location,
    time: timeStr,
    publisher: publisher
  };
}

// ---------- 测试用例 ----------
var testCases = {
  standard:
    "1 繁殖设施  帕多尔  帕多尔Ⅱ - 星球 5  0.9  2.3AU  2025.01.15 12:30:45  任务  Rick Greyman\n" +
    "2 解放矿工A  奥贝  奥贝Ⅴ  0.7  5.1AU  2025.01.15 13:45:22  任务  小明\n" +
    "3 袭击护航队A  吉勒  吉勒Ⅱ  0.4  1.8AU  2025.01.15 14:20:10  任务  Mango TT\n" +
    "4 萨沙取物*  塔玛  塔玛Ⅶ  0.2  8.5AU  2025.01.15 15:00:33  任务  Rick Greyman",
  fewCols:
    "1 繁殖设施  帕多尔  2025.01.15 12:30  Rick Greyman\n" +
    "2 解放矿工A  奥贝  2025.01.15 13:45  小明\n" +
    "3 袭击护航队A  吉勒  2025.01.15 14:20  Mango TT",
  tab:
    "1\t繁殖设施\t帕多尔Ⅱ-星球5\t2025.01.15 12:30:45\tRick Greyman\n" +
    "2\t解放矿工A\t奥贝Ⅴ\t2025.01.15 13:45:22\t小明\n" +
    "3\t袭击护航队A\t吉勒Ⅱ\t2025.01.15 14:20:10\tMango TT",
  simple:
    "1 繁殖设施 - Rick Greyman\n" +
    "2 解放矿工A - 小明\n" +
    "3 袭击护航队A - Mango TT",
  mixed:
    "1 繁殖设施  帕多尔  帕多尔Ⅱ  0.9  2.3AU  2025.01.15 12:30:45  任务  Rick Greyman\n" +
    "解放矿工A  奥贝  2025.01.15 13:45  小明\n" +
    "3 袭击护航队A  吉勒Ⅱ  2025.01.15 14:20:10  Mango TT\n" +
    "萨沙取物 - 匿名玩家\n" +
    "5 自由间谍*  伊勒  2025-06-01 09:00:00  Boss-A"
};

function loadCase(name) {
  document.getElementById("input").value = testCases[name] || "";
}

function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("resultCard").style.display = "none";
}

function testAll() {
  var text = document.getElementById("input").value.trim();
  if (!text) { alert("请先粘贴或加载测试数据"); return; }

  var lines = text.split("\n").filter(function(l) { return l.trim().length > 0; });
  var tbody = document.getElementById("resultBody");
  tbody.innerHTML = "";

  var pass = 0, fail = 0;

  for (var i = 0; i < lines.length; i++) {
    var result = parseLine(lines[i]);
    var isOk = result.task !== "未识别" && result.publisher !== "未识别";
    if (isOk) pass++; else fail++;

    var tr = document.createElement("tr");
    tr.className = isOk ? "ok" : "fail";
    tr.innerHTML =
      "<td>" + (i + 1) + "</td>" +
      "<td>" + escapeHtml(result.task) + "</td>" +
      "<td>" + escapeHtml(result.location) + "</td>" +
      "<td>" + escapeHtml(result.time || "—") + "</td>" +
      "<td>" + escapeHtml(result.publisher) + "</td>" +
      "<td class='" + (isOk ? "pass" : "fail") + "'>" + (isOk ? "✓" : "✗") + "</td>";
    tbody.appendChild(tr);
  }

  document.getElementById("summary").textContent =
    "共 " + lines.length + " 条 — 成功 " + pass + " 条，失败 " + fail + " 条";
  document.getElementById("resultCard").style.display = "";
}

function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
